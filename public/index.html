<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Guardian</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="guardian-lifecycle.js"></script>
  <script src="guardian-hero.js"></script>
  <script src="node-status-card.js"></script>
  <script src="fg-progress-card.js"></script>
  <script src="evolution-progress-card.js"></script>
  <script src="signaling-client.js"></script>
  <script src="share-panel.js"></script>
  <style>
    body {
      background-color: #0a0a0f;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .nav-item:hover {
      background-color: rgba(124, 58, 237, 0.1);
    }
    .nav-item.active {
      background-color: rgba(124, 58, 237, 0.2);
      color: #a78bfa;
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-label {
      font-size: 11px;
      font-weight: 500;
      text-align: center;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col pb-20">
  <div class="flex-1 flex items-center justify-center">
    <div class="w-full max-w-md mx-auto px-4">
      <!-- Home Screen -->
      <section id="screen-home">
        <div id="guardian-hero-container"></div>
        <div id="evolution-progress-container"></div>
        <div id="node-status-container"></div>
        <div id="fg-progress-container"></div>
      </section>

      <!-- Guardian Screen -->
      <section id="screen-guardian" class="text-center hidden">
        <h1 class="text-4xl font-bold mb-4">Guardian</h1>
        <div class="flex flex-col gap-4">
          <p class="text-zinc-400">View and select your Guardian</p>
          <a href="/guardians.html" class="px-4 py-2 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition-colors inline-block">
            Open Guardian Gallery
          </a>
        </div>
      </section>

      <!-- Share Screen -->
      <section id="screen-share" class="hidden">
        <div id="share-panel-container"></div>
      </section>

      <!-- Settings Screen -->
      <section id="screen-settings" class="text-center hidden">
        <h1 class="text-4xl font-bold mb-4">Settings</h1>
        <p class="text-zinc-400">Placeholder for settings screen</p>
      </section>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 flex justify-around">
    <div class="nav-item active" data-tab="home">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </div>
      <div class="nav-label">Home</div>
    </div>

    <div class="nav-item" data-tab="guardian">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="9" cy="11" r="1.5" fill="rgba(10, 10, 15, 0.8)"/>
          <circle cx="15" cy="11" r="1.5" fill="rgba(10, 10, 15, 0.8)"/>
          <path d="M9 15 Q12 17 15 15" stroke="rgba(10, 10, 15, 0.8)" stroke-width="1" fill="none"/>
        </svg>
      </div>
      <div class="nav-label">Guardian</div>
    </div>

    <div class="nav-item" data-tab="settings">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.64l-1.92-3.32c-.12-.22-.39-.3-.61-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.09-.49 0-.61.22L2.74 8.87c-.12.22-.07.49.12.64l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.64l1.92 3.32c.12.22.39.3.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.49 0 .61-.22l1.92-3.32c.12-.22.07-.49-.12-.64l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </div>
      <div class="nav-label">Settings</div>
    </div>
  </nav>

  <script>
    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    // NavigationItem: { label: string, href: string }
    // href is used as the tab id, e.g. 'home', 'guardian', 'network', 'settings'

    // Tab switching handler
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const tabId = item.dataset.tab;
        switchTab(tabId);
      });
    });

    function switchTab(tabId) {
      // Hide all screens
      document.querySelectorAll('section').forEach(section => {
        section.classList.add('hidden');
      });

      // Remove active class from all nav items
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });

      // Show selected screen
      const screenId = 'screen-' + tabId;
      const screen = document.getElementById(screenId);
      if (screen) {
        screen.classList.remove('hidden');
      }

      // Add active class to selected nav item
      const navItem = document.querySelector(`[data-tab="${tabId}"]`);
      if (navItem) {
        navItem.classList.add('active');
      }
    }

    // Save token to localStorage for cross-window access
    if (token) {
      localStorage.setItem('usernode-token', token);
    }

    // Initialize WebSocket signaling client and panels
    async function initializeP2P() {
      if (!token) return;

      try {
        await window.signalingClient.connect(
          token,
          1, // guardianId - will be enhanced later
          'Guardian', // guardianName
          'RARE' // guardianTier
        );

        // Initialize panels once connected
        const sharePanel = new SharePanel('share-panel-container');
      } catch (err) {
        console.error('P2P initialization error:', err);
      }
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => {
      // Mock Guardian data
      /** @type {Guardian} */
      const mockGuardian = {
        id: '001',
        name: 'Guardian #001',
        totalFGHours: 12
      };

      // Mount GuardianHero component to Home screen
      const container = document.getElementById('guardian-hero-container');
      if (container) {
        const heroElement = createGuardianHero(mockGuardian);
        container.appendChild(heroElement);
      }

      // Mount EvolutionProgressCard component to Home screen
      const evolutionContainer = document.getElementById('evolution-progress-container');
      if (evolutionContainer) {
        const evolutionElement = createEvolutionProgressCard(mockGuardian.totalFGHours);
        evolutionContainer.appendChild(evolutionElement);
      }

      // Mock NodeStatus data
      /** @type {NodeStatus} */
      const mockNodeStatus = {
        peers: 23,
        uptime: '2h 14m',
        fgActive: true
      };

      // Mount NodeStatusCard component to Home screen
      const nodeStatusContainer = document.getElementById('node-status-container');
      if (nodeStatusContainer) {
        const cardElement = createNodeStatusCard(mockNodeStatus);
        nodeStatusContainer.appendChild(cardElement);
      }

      // Mock FGProgress data
      // Check if demo=eligible param is set to show eligible state
      const demoEligible = params.get('demo') === 'eligible';
      /** @type {FGProgress} */
      const mockFGProgress = {
        currentMinutes: demoEligible ? 60 : 42,
        requiredMinutes: 60
      };

      // Mount FGProgressCard component to Home screen
      const fgProgressContainer = document.getElementById('fg-progress-container');
      if (fgProgressContainer) {
        const fgCardElement = createFGProgressCard(mockFGProgress);
        fgProgressContainer.appendChild(fgCardElement);
      }

      switchTab('home');
      initializeP2P();
    });
  </script>
</body>
</html>
