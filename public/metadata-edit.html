<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Guardian Metadata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { background-color: #0a0a0f; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <script>
    // usernode-dev-console@1
    (function () {
      if (window.__usernodeDevConsole) return;
      window.__usernodeDevConsole = true;
      var S = '__usernodeDevConsole';
      function serialize(v, depth) {
        depth = depth || 0;
        try {
          if (v === undefined) return 'undefined';
          if (v === null) return 'null';
          if (typeof v === 'string') return v;
          if (typeof v === 'number' || typeof v === 'boolean') return String(v);
          if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
          if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
          if (depth > 3) return '[…]';
          var seen = new WeakSet();
          return JSON.stringify(v, function (k, val) {
            if (typeof val === 'object' && val !== null) {
              if (seen.has(val)) return '[Circular]';
              seen.add(val);
            }
            if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
            if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
            return val;
          });
        } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
      }
      function post(level, args, meta) {
        try {
          var payload = {
            sentinel: S,
            level: level,
            args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
            ts: Date.now(),
            url: location.href,
          };
          if (meta) for (var k in meta) payload[k] = meta[k];
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(payload, '*');
          }
        } catch (_) {}
      }
      ['log','info','warn','error','debug'].forEach(function (level) {
        var orig = console[level] ? console[level].bind(console) : function () {};
        console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
      });
      window.addEventListener('error', function (e) {
        var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
        post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        var msg = (r && (r.stack || r.message)) || String(r);
        post('error', [msg], { kind: 'unhandledrejection' });
      });
    })();

    // Check auth
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) {
      window.location.href = 'https://social-vibecoding.usernodelabs.org';
    }
  </script>

  <div class="min-h-screen bg-zinc-950 p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
      <div class="mb-8">
        <h1 class="text-4xl font-bold mb-2">Edit My Guardian Metadata</h1>
        <p class="text-zinc-400">Update your Guardian's metadata and performance metrics</p>
      </div>

      <div id="alert" class="mb-6 px-4 py-3 rounded-lg hidden"></div>

      <form id="metadataForm" class="bg-zinc-900 rounded-lg border border-zinc-700 p-8 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-2">Guardian ID</label>
            <input
              type="number"
              id="guardianId"
              required
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="e.g., 42"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Owner (Username)</label>
            <input
              type="text"
              id="owner"
              required
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="Your username"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Contribution Score</label>
            <input
              type="number"
              id="score"
              required
              min="0"
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="0"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Level</label>
            <input
              type="number"
              id="level"
              required
              min="0"
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="1"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Stage</label>
            <select
              id="stage"
              required
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
            >
              <option value="">Select a stage</option>
              <option value="INITIATE">INITIATE</option>
              <option value="AWAKENED">AWAKENED</option>
              <option value="ASCENDANT">ASCENDANT</option>
              <option value="GUARDIAN">GUARDIAN</option>
              <option value="MYTHIC">MYTHIC</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">FG Hours</label>
            <input
              type="number"
              id="fgHours"
              required
              min="0"
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="0"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Peer Count</label>
            <input
              type="number"
              id="peerCount"
              required
              min="0"
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="0"
            />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Uptime (%)</label>
            <input
              type="number"
              id="uptime"
              required
              min="0"
              step="0.01"
              class="w-full px-4 py-2 rounded-lg bg-zinc-800 border border-zinc-600 text-zinc-100"
              placeholder="99.5"
            />
          </div>
        </div>

        <div class="flex gap-4">
          <button
            type="submit"
            class="flex-1 px-6 py-3 rounded-lg bg-purple-600 text-white font-semibold hover:bg-purple-700 transition-colors"
          >
            Update Metadata
          </button>
          <button
            type="button"
            onclick="window.location.href='/registry.html'"
            class="flex-1 px-6 py-3 rounded-lg bg-zinc-800 text-white font-semibold hover:bg-zinc-700 transition-colors"
          >
            View Registry
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function getToken() {
      return token || localStorage.getItem('usernode-token');
    }

    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `mb-6 px-4 py-3 rounded-lg ${
        type === 'success'
          ? 'bg-green-900 text-green-100 border border-green-700'
          : 'bg-red-900 text-red-100 border border-red-700'
      }`;
      alert.classList.remove('hidden');
    }

    async function loadMetadata() {
      const authToken = getToken();
      if (!authToken) {
        showAlert('Not authenticated');
        return;
      }

      try {
        // For now, we'll just initialize empty form since we don't have a /me endpoint
        // In production, fetch user's current metadata
        document.getElementById('owner').value = '';
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('metadataForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const authToken = getToken();
      if (!authToken) {
        showAlert('Not authenticated');
        return;
      }

      const formData = {
        guardianId: parseInt(document.getElementById('guardianId').value),
        owner: document.getElementById('owner').value,
        score: parseInt(document.getElementById('score').value),
        level: parseInt(document.getElementById('level').value),
        stage: document.getElementById('stage').value,
        fgHours: parseInt(document.getElementById('fgHours').value),
        peerCount: parseInt(document.getElementById('peerCount').value),
        uptime: parseFloat(document.getElementById('uptime').value)
      };

      try {
        const response = await fetch('/api/metadata/registry', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-usernode-token': authToken
          },
          body: JSON.stringify(formData)
        });

        if (!response.ok) {
          const error = await response.json();
          showAlert(error.error || 'Failed to update metadata');
          return;
        }

        showAlert('Metadata updated successfully!', 'success');
        setTimeout(() => {
          showAlert('Redirecting to registry...', 'success');
          setTimeout(() => {
            window.location.href = '/registry.html';
          }, 1000);
        }, 1500);
      } catch (err) {
        console.error(err);
        showAlert('Error updating metadata: ' + err.message);
      }
    });

    loadMetadata();
  </script>
</body>
</html>
